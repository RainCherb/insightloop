<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}InsightLoop{% endblock %}</title>
    <meta name="description" content="AI-powered customer feedback analyzer for small businesses." />
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#eef2ff',
                100: '#e0e7ff',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
              }
            }
          }
        }
      }
    </script>
</head>
<body class="h-full bg-slate-50 text-slate-900 antialiased">
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 font-semibold">
            <img src="/static/img/logo.svg" class="w-7 h-7" alt="InsightLoop" />
            <span>InsightLoop</span>
        </a>
        <nav class="flex items-center gap-1 text-sm">
            <a href="/analyze"     class="px-3 py-2 rounded hover:bg-slate-100">Analyze</a>
            <a href="/dashboard"   class="px-3 py-2 rounded hover:bg-slate-100">Dashboard</a>
            <a href="/feedback"    class="px-3 py-2 rounded hover:bg-slate-100">Feedback</a>
            <a href="/reports"     class="px-3 py-2 rounded hover:bg-slate-100">Reports</a>
            <a href="/docs"        class="px-3 py-2 rounded hover:bg-slate-100 text-slate-500">API</a>
        </nav>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
</main>

<footer class="border-t border-slate-200 mt-16">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-slate-500 flex items-center justify-between">
        <span>© 2026 InsightLoop · MIT License</span>
        <span>Provider: <code class="text-slate-700">{{ settings.llm_provider }}</code></span>
    </div>
</footer>
</body>
</html>
