{% extends "base.html" %}
{% block title %}Login — InsightLoop{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-slate-200 rounded-xl p-6">
    <h1 class="text-2xl font-semibold mb-1">Login</h1>
    <p class="text-slate-600 text-sm mb-5">Sign in to analyze, save, upload, or delete feedback.</p>

    {% if error %}
        <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <button type="submit"
                class="w-full bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium">
            Login
        </button>
    </form>
</div>
{% endblock %}
